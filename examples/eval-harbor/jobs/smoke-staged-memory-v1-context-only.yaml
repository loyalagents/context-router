job_name: eval-harbor-smoke-staged-memory-v1-context-only
n_concurrent_trials: 1

environment:
  force_build: true
  env:
    EVAL_MEMORY_MODE: context-only
  extra_docker_compose:
    - examples/eval-harbor/jobs/smoke-staged-memory-v1-staged.compose.yml

agents:
  - import_path: examples.eval_harbor_agents.codex_service_tier:CodexWithServiceTier
    model_name: gpt-5.4-mini
    kwargs:
      reasoning_effort: high

tasks:
  - path: examples/eval-harbor/tasks/smoke-staged-memory-v1

extra_instruction_paths:
  - examples/eval-harbor/modes/context-only.md
